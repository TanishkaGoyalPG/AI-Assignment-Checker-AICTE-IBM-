{% extends "base.html" %}
{% block title %}{{ code }} – Error{% endblock %}
{% block page_title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;text-align:center;padding:48px;">
  <p style="font-size:64px;font-weight:800;color:var(--border);">{{ code }}</p>
  <p style="font-size:16px;margin-top:8px;">{{ message }}</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-2">← Back to Dashboard</a>
</div>
{% endblock %}
